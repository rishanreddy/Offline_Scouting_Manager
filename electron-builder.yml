appId: com.frc.offline-scouting-manager
productName: Offline Scouting Manager
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  license: LICENSE
  installerHeader: build/installer-welcome.bmp

mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.productivity

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility

publish:
  provider: generic
  url: https://your-update-server.com/releases
