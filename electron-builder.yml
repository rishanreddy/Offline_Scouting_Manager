appId: com.frc.matchbook
productName: Matchbook
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - '!**/.vscode/*'
  - '!src/**'
  - '!.github/**'
  - '!.opencode/**'
  - '!docs/**'
  - '!release/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.js,eslint.config.mjs,CHANGELOG.md,README.md,AGENTS.md,SECURITY.md,SUPPORT.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,pnpm-workspace.yaml,.editorconfig,.prettierignore,.prettierrc,.prettierrc.yaml}'
  - '!{postcss.config.cjs,tailwind.config.cjs,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

asarUnpack:
  - resources/**

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  license: LICENSE
  installerHeader: build/installer-welcome.bmp

mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.productivity

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility

publish:
  provider: github
  owner: rishanreddy
  repo: matchbook
  releaseType: release
